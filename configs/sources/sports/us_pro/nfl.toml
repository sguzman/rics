[source]
key = "sports.us.nfl"
name = "NFL"
domain = "sports"
enabled = true
timezone = "UTC"
jurisdiction = "US"
default_country = "US"

[fetch]
mode = "file"
file_path = "../../../../data/sources/sports/us_pro/nfl.txt"
timeout_secs = 10
retry_attempts = 1
retry_backoff_ms = 10

[extract]
format = "text"

[date]
primary = "date"
formats = ["%Y-%m-%d", "%Y"]
assume_timezone = "UTC"
allow_month_only = true
allow_year_only = true

[event]
event_type = "sports_event"
status = "scheduled"
categories = ["sports", "us_pro", "nfl"]
importance = 88

[custom]
enabled = true
parser = "structured_calendar_feed_v1"

[publish]
file_name_template = "us-sports-nfl-{{year}}.ics"
